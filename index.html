<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn thi Ngữ Văn — Bộ Đề 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1f38;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #faf6ef;
            --red: #c0392b;
            --green: #1a7a4a;
            --text: #1a1a2e;
            --border: #d4c4a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: var(--cream);
            color: var(--text);
            padding: 40px 20px 80px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .wrapper { max-width: 860px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        .header-line { height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-bottom: 20px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--navy); letter-spacing: 1px; text-transform: uppercase; }
        header p { color: var(--gold); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; font-weight: 600; }
        .badge { display: inline-block; background: var(--navy); color: var(--gold); font-size: 0.72rem; padding: 4px 14px; border-radius: 20px; letter-spacing: 2px; text-transform: uppercase; margin-top: 12px; font-weight: 600; }

        .progress-label { text-align: right; font-size: 0.8rem; color: #888; margin-bottom: 6px; font-weight: 600; }
        .progress-wrap { background: #e8e0d0; border-radius: 10px; height: 8px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 10px; transition: width 0.4s ease; width: 0%; }

        .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--navy); border-left: 4px solid var(--gold); padding: 6px 0 6px 14px; margin: 0 0 24px; }

        .set-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 28px 30px; margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .set-card.solved { border-color: var(--green); box-shadow: 0 0 0 2px rgba(26,122,74,0.12); }

        .set-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
        .set-badge { background: var(--navy); color: var(--gold); font-family: 'Playfair Display', serif; font-size: 0.82rem; font-weight: 700; padding: 4px 14px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .set-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--navy); line-height: 1.4; }

        .questions { display: flex; flex-direction: column; gap: 14px; }
        .q-row { background: #faf7f1; border: 1px solid #ede4d0; border-radius: 8px; padding: 14px 16px; }
        .q-row.solved { background: #edfaf3; border-color: #a8d8b9; }
        .q-text { font-size: 0.93rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; line-height: 1.55; }
        .options { display: flex; flex-direction: column; gap: 5px; }
        .opt-btn {
            display: flex; align-items: flex-start; gap: 10px;
            background: white; border: 1.5px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            cursor: pointer; text-align: left;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.88rem; color: var(--text);
            transition: all 0.15s; line-height: 1.5;
            width: 100%;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--gold); background: #fdf5e0; }
        .opt-letter {
            font-family: 'Playfair Display', serif; font-weight: 700;
            font-size: 0.85rem; color: var(--navy);
            background: #f0e8d0; border-radius: 4px;
            min-width: 22px; height: 22px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 1px;
        }
        .opt-btn.correct { background: #edfaf3; border-color: var(--green); }
        .opt-btn.correct .opt-letter { background: var(--green); color: white; }
        .opt-btn.wrong { background: #fdf0ef; border-color: var(--red); animation: shake 0.35s ease; }
        .opt-btn.wrong .opt-letter { background: var(--red); color: white; }
        .opt-btn:disabled { cursor: default; opacity: 0.4; }
        .opt-btn.correct:disabled, .opt-btn.wrong:disabled { opacity: 1; }

        .topic-chip { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; letter-spacing: 0.4px; }
        .chip-xuat-toc   { background: #fce4ec; color: #ad1457; }
        .chip-tay-tien   { background: #e3f2fd; color: #1565c0; }
        .chip-voi-vang   { background: #fce4ec; color: #b71c6b; }
        .chip-bam-thit   { background: #fff3e0; color: #b45309; }
        .chip-tuyen-ngon { background: #e8f5e9; color: #1a6e3a; }
        .chip-ngon-ngu   { background: #f3e8ff; color: #7e22ce; }
        .chip-hon-truong { background: #e0f2f1; color: #00695c; }

        .score-box { display: none; text-align: center; background: var(--navy); color: white; border-radius: 12px; padding: 32px; margin: 40px 0 20px; position: relative; overflow: hidden; }
        .score-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold)); }
        .score-number { font-family: 'Playfair Display', serif; font-size: 3.4rem; color: var(--gold); line-height: 1; }
        .score-label { font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.65; margin-top: 6px; }
        .score-rows { margin-top: 14px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .score-row { font-size: 0.92rem; opacity: 0.88; }
        .score-row strong { color: var(--gold-light); }

        .btn-group { text-align: center; margin-top: 28px; }
        .btn-reset { font-family: 'Source Sans 3', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; border: 2px solid #ccc; border-radius: 6px; padding: 11px 28px; cursor: pointer; background: white; color: #777; transition: all 0.2s; }
        .btn-reset:hover { background: #f5f5f5; border-color: #aaa; }

        .feedback { margin-top: 14px; font-size: 0.88rem; font-weight: 600; min-height: 18px; }
        .feedback.ok { color: var(--green); }

        @keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} 100%{transform:translateX(0)} }
        @media(max-width:600px){ .set-card{padding:16px 12px} }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="header-line"></div>
        <h1>Ôn Thi Ngữ Văn</h1>
        <p>Bộ Đề 2 — Trắc Nghiệm</p>
        <span class="badge">48 Câu Hỏi</span>
        <div class="header-line" style="margin-top:20px;"></div>
    </header>

    <div class="progress-label" id="progressLabel">0 / 48 câu đã hoàn thành</div>
    <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>

    <div class="section-title">Trắc nghiệm khách quan — Chọn một đáp án đúng nhất</div>

    <div id="quizContainer"></div>

    <div class="score-box" id="scoreBox">
        <div class="score-number" id="scoreNum">—</div>
        <div class="score-label">Điểm số</div>
        <div class="score-rows" id="scoreRows"></div>
    </div>

    <div class="btn-group">
        <button class="btn-reset" onclick="resetQuiz()">↺ Làm lại (xáo trộn câu hỏi)</button>
    </div>
</div>

<script>
const QUESTIONS = [
    { q: 'Câu 1.Câu  1: Cụm từ "chết một cách rất thể thao" có nghĩa là gì?', opts: ['Cho thấy tác hại của việc tập thể thao', 'Thể hiện tinh thần của người hâm mộ', 'Thể hiện sự thái quá của người hâm mộ khi họ dùng thuốc phiện để quên đi sự tiếc nuối', 'Tất cả các đáp án trên'], ans: 2, topic: 'xuat-toc' },
    { q: 'Câu 2. Câu  2:Thái độ của tác giả thể hiện qua đoạn trích "Nghệ thuật băm thịt gà" là gì?', opts: ['Đồng cảm, sẻ chia với nhân vật', 'Ca ngợi lối sống thành thị hiện đại', 'Châm biếm, đả kích sâu cay', 'Ngợi ca vẻ đẹp truyền thống'], ans: 2, topic: 'bam-thit' },
    { q: 'Câu 3.Câu  3: Bài thơ "Tây Tiến" được Quang Dũng sáng tác trong hoàn cảnh nào?', opts: ['Năm 1947, khi Quang Dũng còn là Đại đội trưởng của đoàn quân Tây Tiến', 'Cuối năm 1948, khi Quang Dũng không còn ở đoàn quân Tây Tiến mà đã chuyển sang đơn vị khác', 'Khi Quang Dũng làm công tác văn nghệ tại chiến khu Việt Bắc', 'Cả 3 đáp án đều không chính xác'], ans: 1, topic: 'tay-tien' },
    { q: 'Câu 4.Câu  4: Qua 13 câu thơ đầu bài Vội vàng, Xuân Diệu tha thiết giục mọi người hãy yêu mến cuộc sống ở:', opts: ['Cuộc sống ở trần gian', 'Cuộc sống thần tiên', 'Cuộc sống trong văn chương', 'Cuộc sống trong mộng tưởng'], ans: 0, topic: 'voi-vang' },
    { q: 'Câu 5.Câu  5: Cảm hứng chủ đạo của bài thơ "Vội vàng" là gì?', opts: ['Nỗi buồn trước thân phận con người', 'Tình yêu thiên nhiên gắn với khát vọng sống mãnh liệt', 'Ca ngợi vẻ đẹp của lao động', 'Nỗi nhớ quê hương da diết'], ans: 1, topic: 'voi-vang' },
    { q: 'Câu 6.Câu  6: Tác giả của văn bản "Nghệ thuật băm thịt gà" là ai?', opts: ['Tô Hoài', 'Ngô Tất Tố', 'Nam Cao', 'Hồ Chí Minh'], ans: 1, topic: 'bam-thit' },
    { q: 'Câu 7.Câu  7: Trong Tuyên ngôn Độc lập, Hồ Chí Minh đã khẳng định sự thật nào?', opts: ['Từ mùa thu 1940 nước ta thành thuộc địa của Nhật chứ không phải của Pháp nữa', 'Khi Nhật hàng Đồng minh, nhân dân cả nước nổi dậy giành chính quyền', 'Dân ta đã lấy lại nước Việt Nam từ tay Nhật chứ không phải từ tay Pháp', 'Cả ba điều trên'], ans: 3, topic: 'tuyen-ngon' },
    { q: 'Câu 8.Câu  8: Câu văn nào dưới đây thể hiện đầy đủ nhất nội dung của bản Tuyên ngôn Độc lập?', opts: ['Toàn dân Việt Nam trên dưới một lòng chống lại âm mưu xâm lược của bọn thực dân', 'Pháp chạy, Nhật hàng, vua Bảo Đại thoái vị', 'Nước Việt Nam có quyền hưởng tự do và độc lập, và sự thật đã trở thành nước tự do và độc lập', 'Toàn thể dân Việt Nam quyết đem tất cả tinh thần và lực lượng, tính mạng và của cải để giữ vững quyền tự do độc lập ấy'], ans: 2, topic: 'tuyen-ngon' },
    { q: 'Câu 9.Câu  9: Điểm khác biệt cơ bản nhất giữa ngôn ngữ trang trọng và ngôn ngữ thân mật là gì?', opts: ['Số lượng từ ngữ được sử dụng', 'Đối tượng giao tiếp và hoàn cảnh sử dụng', 'Độ dài của câu nói', 'Cách phát âm từ ngữ'], ans: 1, topic: 'ngon-ngu' },
    { q: 'Câu 10.Câu  10: Sự trong sáng của tiếng Việt gắn liền với những phẩm chất nào?', opts: ['Giản dị và chân thật', 'Phong phú và đa dạng', 'Giàu có và đẹp đẽ', 'Kiểu cách và duyên dáng'], ans: 2, topic: 'ngon-ngu' },
    { q: 'Câu 11.Câu  11: Ý nào không đúng khi sử dụng từ mượn?', opts: ['Không được lạm dụng từ vay mượn', 'Phải dùng đúng lúc, đúng chỗ thì mới có giá trị', 'Những từ nào tiếng ta đã có thì không dùng từ mượn', 'Dùng thêm nhiều từ mượn để làm phong phú ngôn ngữ tiếng Việt'], ans: 3, topic: 'ngon-ngu' },
    { q: 'Câu 12.Câu  12: Trong các trường hợp sau, trường hợp nào thể hiện đúng tinh thần phát triển tiếng Việt?', opts: ['Hạn chế tuyệt đối việc sáng tạo từ mới', 'Thay thế toàn bộ từ Hán Việt bằng từ thuần Việt', 'Tiếp thu từ ngữ mới có chọn lọc, phù hợp với hệ thống tiếng Việt', 'Sử dụng nhiều từ nước ngoài để tạo cảm giác hiện đại'], ans: 2, topic: 'ngon-ngu' },
    { q: 'Câu 13.Câu  13: Dòng nào đúng nhất về năm sinh và năm mất của Vũ Trọng Phụng?', opts: ['1912 – 1939', '1912 – 1938', '1912 – 1940', '1910 – 1939'], ans: 0, topic: 'xuat-toc' },
    { q: 'Câu 14.Câu  14: Đoàn quân Tây Tiến được thành lập năm nào?', opts: ['1946', '1947', '1948', '1949'], ans: 1, topic: 'tay-tien' },
    { q: 'Câu 15.Câu  15: Nhiệm vụ của đoàn quân Tây Tiến là gì?', opts: ['Giúp bộ đội Lào bảo vệ nước Lào', 'Bảo vệ biên giới Tây Bắc của Tổ Quốc', 'Phối hợp với bộ đội Lào để bảo vệ biên giới Việt–Lào', 'Đánh tiêu hao lực lượng đội quân Pháp ở Thượng Lào và miền Tây Bắc Bộ'], ans: 3, topic: 'tay-tien' },
    { q: 'Câu 16.Câu  16: Trong bài thơ Vội vàng, Xuân Diệu thiết tha giục giã mọi người hãy yêu mến cuộc sống:', opts: ['Cuộc sống nơi tiên giới', 'Cuộc sống trong mơ ước', 'Cuộc sống trong văn chương', 'Cuộc sống nơi trần thế'], ans: 3, topic: 'voi-vang' },
    { q: 'Câu 17.Câu  17: Tác giả của văn bản "Nghệ thuật băm thịt gà" là ai?', opts: ['Tô Hoài', 'Ngô Tất Tố', 'Nam Cao', 'Hồ Chí Minh'], ans: 1, topic: 'bam-thit' },
    { q: 'Câu 18.Câu  18: Thái độ của tác giả thể hiện qua đoạn trích "Nghệ thuật băm thịt gà" là gì?', opts: ['Đồng cảm, sẻ chia với nhân vật', 'Ca ngợi lối sống thành thị hiện đại', 'Châm biếm, đả kích sâu cay', 'Ngợi ca vẻ đẹp truyền thống'], ans: 2, topic: 'bam-thit' },
    { q: 'Câu 19.Câu  19: Hồ Chí Minh chọn hai đoạn tiêu biểu trong Tuyên ngôn Độc lập của Pháp và Mỹ để mở đầu với dụng ý nào?', opts: ['Cả ba dụng ý trên', 'Làm cơ sở tuyên bố độc lập tự do cho nước mình', 'Đặt cuộc Cách mạng tháng 8-1945 ngang hàng với cuộc Cách mạng của Mỹ và Pháp', 'Dùng chính lí lẽ của đối thủ để bác bỏ luận điệu và hành động của chúng'], ans: 0, topic: 'tuyen-ngon' },
    { q: 'Câu 20.Câu  20: Bản Tuyên ngôn Độc lập được viết cho ai?', opts: ['Đồng bào cả nước và nhân dân thế giới', 'Bọn đế quốc, thực dân đã và đang âm mưu xâm lược nước ta', 'Các nước đồng minh đang ủng hộ ta', 'A và B đúng'], ans: 3, topic: 'tuyen-ngon' },
    { q: 'Câu 21.Câu  21: Trong trường hợp nào sau đây, ngôn ngữ trang trọng được sử dụng phù hợp nhất?', opts: ['Trò chuyện giữa bạn bè thân thiết', 'Trao đổi trong gia đình', 'Phát biểu trong hội nghị chính thức', 'Nhắn tin qua mạng xã hội'], ans: 2, topic: 'ngon-ngu' },
    { q: 'Câu 22. Câu  22:Sự trong sáng của tiếng Việt có những biểu hiện là gì?', opts: ['Không pha tạp những yếu tố lai căng, pha tạp trong khi vẫn dung nạp những yếu tố tích cực ', 'Giữ những phẩm chất đẹp đẽ của tiếng việt nhưng cũng cần vay mượn để làm tăng lên từ vựng và phong phú trong ngữ pháp của tiếng việt.', 'Biểu hiện ở tính văn hóa, lịch sự của lời nói', 'Cả ba đáp án trên'], ans: 3, topic: 'ngon-ngu' },
    { q: 'Câu 23.Câu  23: Mở đầu đoạn trích Hồn Trương Ba, da hàng thịt, Trương Ba đối thoại với ai?', opts: ['Xác hàng thịt', 'Vợ Trương Ba', 'Chị con dâu', 'Đế Thích'], ans: 0, topic: 'hon-truong' },
    { q: 'Câu 24.Câu  24: Chọn từ thích hợp để điền vào chỗ trống: "....... của cậu ấy là thiếu kiên nhẫn trong học tập"', opts: ['Yếu điểm', 'Điểm yếu', 'Điểm mạnh', 'Thế mạnh'], ans: 1, topic: 'ngon-ngu' },
    { q: 'Câu 25.Câu  25: Bài thơ Vội vàng được sáng tác theo thể thơ nào?', opts: ['Thất ngôn trường thiên', 'Tự do', 'Lục bát', 'Thất ngôn bát cú'], ans: 1, topic: 'voi-vang' },

const TOPIC_LABELS = {
    'xuat-toc':   { label: 'Xuân Tóc Đỏ / VTP', cls: 'chip-xuat-toc' },
    'tay-tien':   { label: 'Tây Tiến',           cls: 'chip-tay-tien' },
    'voi-vang':   { label: 'Vội Vàng',           cls: 'chip-voi-vang' },
    'bam-thit':   { label: 'Băm Thịt Gà',        cls: 'chip-bam-thit' },
    'tuyen-ngon': { label: 'Tuyên Ngôn ĐL',      cls: 'chip-tuyen-ngon' },
    'ngon-ngu':   { label: 'Ngôn Ngữ / TV',      cls: 'chip-ngon-ngu' },
    'hon-truong': { label: 'Hồn Trương Ba',       cls: 'chip-hon-truong' },
};

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function buildShuffled() {
    return shuffle(QUESTIONS).map(q => {
        const indexed = q.opts.map((opt, i) => ({ opt, isAns: i === q.ans }));
        const sh = shuffle(indexed);
        return { q: q.q.replace(/^Câu \d+\.\s*/, ''), topic: q.topic, opts: sh.map(x => x.opt), ans: sh.findIndex(x => x.isAns) };
    });
}

let questions = [];
let state = { solved: [], attempts: [], chosen: [] };

function initState() {
    questions = buildShuffled();
    state = { solved: new Array(questions.length).fill(false), attempts: new Array(questions.length).fill(0), chosen: new Array(questions.length).fill(null) };
}

function render() {
    const container = document.getElementById('quizContainer');
    const allSolved = state.solved.every(Boolean);

    const questionsHtml = questions.map((q, qi) => {
        const solved = state.solved[qi];
        const topic = TOPIC_LABELS[q.topic];
        const chipHtml = topic ? `<span class="topic-chip ${topic.cls}">${topic.label}</span>` : '';
        const optsHtml = q.opts.map((opt, oi) => {
            const letter = ['A','B','C','D'][oi];
            const isAns = oi === q.ans;
            let cls = '';
            if (solved) {
                if (isAns) cls = 'correct';
                else if (state.chosen[qi] === oi) cls = 'wrong';
            }
            return `<button class="opt-btn ${cls}" id="opt-${qi}-${oi}"
                onclick="chooseOpt(${qi},${oi})" ${solved ? 'disabled' : ''}>
                <span class="opt-letter">${letter}</span>${opt}
            </button>`;
        }).join('');
        return `<div class="q-row ${solved ? 'solved' : ''}" id="qrow-${qi}">
            <div class="q-text"><span style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);margin-right:4px">Câu ${qi+1}.</span>${q.q}${chipHtml}</div>
            <div class="options">${optsHtml}</div>
        </div>`;
    }).join('');

    container.innerHTML = `
        <div class="set-card ${allSolved ? 'solved' : ''}" id="main-card">
            <div class="set-header">
                <span class="set-badge" id="main-badge" style="${allSolved ? 'background:var(--green)' : ''}">Bộ Đề 2</span>
                <span class="set-title">Trắc nghiệm khách quan — 48 câu</span>
            </div>
            <div class="questions">${questionsHtml}</div>
            <div class="feedback ${allSolved ? 'ok' : ''}" id="fb-main">
                ${allSolved ? '✓ Hoàn thành tất cả! Xuất sắc!' : ''}
            </div>
        </div>`;

    updateProgress();
    updateScore();
}

function chooseOpt(qi, oi) {
    if (state.solved[qi]) return;
    state.attempts[qi]++;
    state.chosen[qi] = oi;
    const correctOi = questions[qi].ans;
    const btn = document.getElementById(`opt-${qi}-${oi}`);
    if (oi === correctOi) {
        state.solved[qi] = true;
        questions[qi].opts.forEach((_, i) => {
            const b = document.getElementById(`opt-${qi}-${i}`);
            if (b) { b.disabled = true; if (i === correctOi) b.classList.add('correct'); }
        });
        document.getElementById(`qrow-${qi}`).classList.add('solved');
        if (state.solved.every(Boolean)) {
            document.getElementById('main-card').classList.add('solved');
            document.getElementById('main-badge').style.background = 'var(--green)';
            const fb = document.getElementById('fb-main');
            fb.className = 'feedback ok';
            fb.textContent = '✓ Hoàn thành tất cả! Xuất sắc!';
        }
        updateProgress();
        updateScore();
    } else {
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 500);
    }
}

function updateProgress() {
    const total = questions.length;
    const done = state.solved.filter(Boolean).length;
    document.getElementById('progressBar').style.width = (done / total * 100) + '%';
    document.getElementById('progressLabel').textContent = `${done} / ${total} câu đã hoàn thành`;
}

function updateScore() {
    const total = questions.length;
    const done = state.solved.filter(Boolean).length;
    const first = state.solved.filter((v, i) => v && state.attempts[i] === 1).length;
    const box = document.getElementById('scoreBox');
    box.style.display = 'block';
    document.getElementById('scoreNum').textContent = `${done} / ${total}`;
    document.getElementById('scoreRows').innerHTML = `
        <div class="score-row">⭐ Đúng lần đầu: <strong>${first} / ${total}</strong></div>
        ${done === total ? `<div class="score-row" style="color:var(--gold-light);font-size:1.05rem">🎉 Hoàn thành! Rất xuất sắc!</div>` : ''}
    `;
    if (done === total) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
    document.getElementById('scoreBox').style.display = 'none';
    initState();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

initState();
render();
</script>
